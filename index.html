<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NX SPACE 點餐系統 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        canvas { background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .menu-item { border-bottom: 1px solid #f3f4f6; padding: 14px 0; }
        .tab-btn.active { background-color: #111827; color: #ffffff; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div id="browser-warning-banner" class="hidden mb-4 bg-amber-500 text-stone-900 text-xs font-bold p-3 rounded-xl shadow-sm border border-amber-600 animate-pulse">
        <p class="leading-relaxed">
            ⚠️ 偵測到您目前使用 App 內建瀏覽器，可能導致菜單庫存未即時更新。<br>
            👉 <button onclick="copyCurrentUrl()" class="underline text-stone-900 font-black bg-white/40 px-1.5 py-0.5 rounded ml-1">點此複製網址</button> 至 Safari 或 Chrome 開啟！
        </p>
    </div>

    <div id="custom-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs shadow-xl border border-gray-100 transform transition-all">
            <h3 id="modal-title" class="text-base font-bold text-gray-900 mb-2 tracking-wide"></h3>
            <div id="modal-body" class="text-xs text-gray-600 leading-relaxed mb-6 space-y-2"></div>
            <div id="modal-actions" class="flex space-x-3 justify-end text-xs font-medium"></div>
        </div>
    </div>

    <div id="loading-spinner" class="flex flex-col items-center justify-center py-20 space-y-3">
        <div class="w-10 h-10 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-xs text-gray-400 font-medium tracking-wide">同步大腦最新試算表庫存中...</p>
    </div>

    <div id="main-content" class="hidden">
        <div class="text-center my-6">
            <h1 class="text-2xl font-bold tracking-wider text-gray-800">NX SPACE 馜享空間</h1>
            <div class="flex justify-center space-x-2 mt-3">
                <button onclick="switchVenue('tiehua')" id="tab-tiehua" class="tab-btn px-3 py-1 text-xs rounded-full bg-gray-200 text-gray-700 font-medium transition">鐵花館</button>
                <button onclick="switchVenue('oasis')" id="tab-oasis" class="tab-btn px-3 py-1 text-xs rounded-full bg-gray-200 text-gray-700 font-medium transition">綠洲場</button>
                <button onclick="switchVenue('donghai')" id="tab-donghai" class="tab-btn px-3 py-1 text-xs rounded-full bg-gray-200 text-gray-700 font-medium transition">東海館</button>
            </div>
        </div>

        <div id="entrance-stage" class="block">
            <div class="mb-5 bg-white border border-gray-100 rounded-xl shadow-sm overflow-hidden">
                <button onclick="toggleAnnouncement()" class="w-full flex justify-between items-center px-4 py-3 bg-stone-50 hover:bg-stone-100 transition text-left">
                    <span id="announcement-title" class="text-xs font-bold text-stone-700 tracking-wide flex items-center">
                        📅 最新活動資訊
                    </span>
                    <span id="announce-arrow" class="text-xs text-stone-400 transition-transform duration-200">▼</span>
                </button>
                <div id="announce-content" class="p-4 border-t border-gray-100 text-xs text-stone-600 space-y-3 leading-relaxed bg-white">
                    <div id="dynamic-announcement-box" class="whitespace-pre-line"></div>
                </div>
            </div>

            <p class="text-sm text-gray-600 mb-2 text-center">請點擊下方品牌圖示查看介紹：</p>
            <canvas id="brandCanvas" width="360" height="190" class="mx-auto touch-none"></canvas>
            
            <div id="brand-card" class="hidden mt-4 p-5 bg-white rounded-xl shadow-sm border border-gray-100">
                <h2 id="card-title" class="text-xl font-bold text-gray-800"></h2>
                <p id="card-desc" class="text-sm text-gray-600 my-3 leading-relaxed whitespace-pre-line"></p>
                <div class="flex space-x-4 mb-4 text-xs text-blue-600 font-medium">
                    <a id="link-fans" href="#" target="_blank" rel="noopener noreferrer">📸 品牌官方社群</a>
                </div>
                <button id="go-order-btn" class="w-full bg-black text-white text-sm py-3 rounded-lg font-medium tracking-wide hover:bg-gray-800 transition">
                    進入點餐介面
                </button>
            </div>

            <div id="history-card" class="hidden mt-4 p-5 bg-stone-950 text-stone-100 rounded-xl shadow-sm border border-stone-800">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-bold tracking-wider text-amber-400">📋 您的最新預訂紀錄</h3>
                    <button onclick="triggerClearHistoryAlert()" class="text-[10px] text-stone-400 hover:text-stone-200 underline">清除紀錄</button>
                </div>
                <div class="text-xs space-y-2 text-stone-300">
                    <p><strong>預訂商店：</strong> <span id="hist-brand"></span></p>
                    <p><strong>取餐時間：</strong> <span id="hist-time"></span></p>
                    <p><strong>用餐方式：</strong> <span id="hist-dining" class="text-amber-400 font-medium"></span></p>
                    <p><strong>餐點內容：</strong> <span id="hist-content" class="block bg-stone-900 p-2 rounded mt-1 text-stone-200 break-all"></span></p>
                    <p class="text-right text-stone-400 font-medium">應付總額：<span id="hist-total" class="text-sm font-bold text-emerald-400"></span> 元</p>
                </div>
            </div>

            <div class="mt-6 p-4 bg-white rounded-xl border border-stone-200 shadow-sm text-center">
                <p class="text-xs font-bold text-stone-800 mb-2 tracking-wide">🤝 歡迎品牌進駐！餐車與場租合作</p>
                <div class="flex justify-center space-x-3 text-xs">
                    <a href="https://lin.ee/VAwAg1I" target="_blank" rel="noopener noreferrer" class="px-4 py-1.5 bg-[#06C755] text-white rounded-full font-medium shadow-sm flex items-center">LINE 客服</a>
                    <a href="https://www.facebook.com/nxspace254" target="_blank" rel="noopener noreferrer" class="px-4 py-1.5 bg-[#1877F2] text-white rounded-full font-medium shadow-sm flex items-center">臉書專頁</a>
                </div>
            </div>

            <div id="dynamic-footer-notice" class="mt-4 p-4 bg-gray-100 rounded-xl border border-gray-200 text-[10px] text-gray-500 leading-relaxed space-y-1.5 whitespace-pre-line"></div>
        </div>

        <div id="order-stage" class="hidden bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <button onclick="backToEntrance()" class="text-xs text-gray-400 mb-4 flex items-center">← 返回品牌選擇</button>
            <h2 id="order-target" class="text-lg font-bold text-gray-800 mb-2"></h2>
            
            <form id="menuForm" class="space-y-4 text-sm">
                <div>
                    <label class="block text-gray-700 font-medium mb-1">取餐人姓名</label>
                    <input type="text" id="cust_name" required class="w-full border border-gray-200 p-2.5 rounded-lg focus:outline-none focus:border-black">
                </div>
                <div>
                    <label class="block text-gray-700 font-medium mb-1">聯絡電話</label>
                    <input type="tel" id="cust_phone" required class="w-full border border-gray-200 p-2.5 rounded-lg focus:outline-none focus:border-black">
                </div>
                
                <div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 font-medium mb-1">取餐日期</label>
                            <select id="pickup_date" required class="w-full border border-gray-200 p-2.5 rounded-lg bg-white focus:outline-none focus:border-black"></select>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-medium mb-1">取餐時間</label>
                            <select id="pickup_time" required class="w-full border border-gray-200 p-2.5 rounded-lg bg-white focus:outline-none focus:border-black">
                                <option value="" disabled selected>請選擇時間</option>
                                <option value="17:30">17:30</option>
                                <option value="18:00">18:00</option>
                                <option value="18:30">18:30</option>
                                <option value="19:00">19:00</option>
                                <option value="19:30">19:30</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="border-t border-b border-gray-100 py-4 my-4">
                    <p class="font-bold text-gray-800 mb-3 text-base">🍽️ 線上菜單（可多選）</p>
                    <div id="menu_list_container" class="space-y-1"></div>
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-1">備註說明 (選填)</label>
                    <input type="text" id="order_note" placeholder="例如：少鹽｜不要洋蔥" class="w-full border border-gray-200 p-2.5 rounded-lg focus:outline-none focus:border-black">
                </div>
                
                <button type="submit" id="submit-order-btn" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-medium mt-6 hover:bg-emerald-700 transition">送出預訂單</button>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw_JxFpE2Whdt9rRRR_L-ohF61yMuuRaw-VcfrE2Adxr9FzbS-9ajadyAJHLELSsUg/exec";

        let dbData = { main_config: {}, brands: [], menus: {} };
        let selectedBrand = null;
        let brandImages = {};
        let currentVenue = "oasis"; // 預設看綠洲場
        
        const canvas = document.getElementById('brandCanvas');
        const ctx = canvas.getContext('2d');

        function detectInAppBrowser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            if (ua.indexOf("LINE") > -1 || ua.indexOf("Twitter") > -1) {
                document.getElementById('browser-warning-banner').classList.remove('hidden');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            detectInAppBrowser();
            fetch(GAS_URL).then(res => res.json()).then(data => {
                dbData = data;
                // 預設切換到綠洲
                switchVenue('oasis');
                
                // 載入廠商圖片
                const imgBase = dbData.main_config.github_img_base || "";
                let loadedCount = 0;
                dbData.brands.forEach(b => {
                    brandImages[b.id] = new Image();
                    brandImages[b.id].src = b.imgUrl ? (b.imgUrl.startsWith("http") ? b.imgUrl : imgBase + b.imgUrl) : "";
                    brandImages[b.id].onload = brandImages[b.id].onerror = () => {
                        loadedCount++;
                        if (loadedCount === dbData.brands.length) drawCanvas();
                    };
                });

                document.getElementById('loading-spinner').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                checkOrderHistory();
            });
        });

        // 🌟 切換場館公告的邏輯
        function switchVenue(venue) {
            currentVenue = venue;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${venue}`).classList.add('active');

            const title = dbData.main_config[`activity_title_${venue}`] || "最新活動資訊";
            const notice = dbData.main_config[`notice_text_${venue}`] || "暫無公告資訊。";

            document.getElementById('announcement-title').innerText = "📅 " + title;
            document.getElementById('dynamic-announcement-box').innerText = notice;
            document.getElementById('dynamic-footer-notice').innerText = notice;
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (dbData.brands[0]) drawBrandButton(dbData.brands[0], 90, 70);
            if (dbData.brands[1]) drawBrandButton(dbData.brands[1], 270, 70);
        }

        // 🌟【精準字體切割修正】讀取 Excel 的 subName
        function drawBrandButton(brand, cx, cy) {
            const radius = 55;
            const isSelected = selectedBrand?.id === brand.id;
            ctx.save();
            ctx.beginPath(); ctx.arc(cx, cy, radius + 4, 0, Math.PI * 2);
            ctx.fillStyle = isSelected ? '#111827' : 'transparent'; ctx.fill();
            
            ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.clip();
            const img = brandImages[brand.id];
            if (img && img.complete && img.naturalWidth > 0) {
                ctx.drawImage(img, cx - radius, cy - radius, radius * 2, radius * 2);
                ctx.fillStyle = isSelected ? 'rgba(0, 0, 0, 0.25)' : 'rgba(0, 0, 0, 0.05)';
                ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.fillStyle = isSelected ? '#111827' : '#E5E7EB'; ctx.fill();
            }
            ctx.restore();

            const textY = cy + radius + 12;
            
            // 🌟 中間文字：抓 brand.name (粗體放大)
            ctx.fillStyle = isSelected ? '#111827' : '#374151';
            ctx.font = 'bold 15px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(brand.name, cx, textY);

            // 🌟 下方文字：抓 brand.subName (變小、灰字)
            if (brand.subName) {
                ctx.font = '12px sans-serif';
                ctx.fillStyle = '#6B7280';
                ctx.fillText(brand.subName, cx, textY + 18);
            }
        }

        canvas.addEventListener('click', function(event) {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left; const y = event.clientY - rect.top;
            if (dbData.brands[0] && Math.sqrt((x-90)**2 + (y-70)**2) < 55) showBrandCard(dbData.brands[0]);
            else if (dbData.brands[1] && Math.sqrt((x-270)**2 + (y-70)**2) < 55) showBrandCard(dbData.brands[1]);
        });

        function showBrandCard(brand) {
            selectedBrand = brand; drawCanvas();
            document.getElementById('brand-card').classList.remove('hidden');
            document.getElementById('card-title').innerText = brand.name + " " + (brand.subName || "");
            document.getElementById('card-desc').innerText = brand.desc || "暫無介紹";
            document.getElementById('link-fans').href = brand.fansPage || "#";
        }

        function toggleAnnouncement() {
            const content = document.getElementById('announce-content');
            content.classList.toggle('hidden');
        }

        function backToEntrance() {
            document.getElementById('order-stage').classList.add('hidden');
            document.getElementById('entrance-stage').classList.remove('hidden');
        }

        // 點餐菜單渲染與 options 處理
        document.getElementById('go-order-btn').addEventListener('click', function() {
            if (!selectedBrand) return;
            document.getElementById('entrance-stage').classList.add('hidden');
            document.getElementById('order-stage').classList.remove('hidden');
            document.getElementById('order-target').innerText = "訂購廠商：" + selectedBrand.name;
            
            const dateSelect = document.getElementById('pickup_date');
            dateSelect.innerHTML = '<option value="6/19 (五)">6/19 (五)</option><option value="6/20 (六)">6/20 (六)</option><option value="6/21 (日)">6/21 (日)</option>';

            const menuContainer = document.getElementById('menu_list_container');
            menuContainer.innerHTML = "";
            const brandMenu = dbData.menus[selectedBrand.id] || [];

            brandMenu.forEach((item, index) => {
                let itemDiv = document.createElement('div');
                itemDiv.className = "menu-item flex flex-col py-3";
                itemDiv.innerHTML = `
                    <div class="flex justify-between items-center w-full">
                        <div>
                            <span class="font-medium text-gray-800">${item.name}</span>
                            <span class="text-xs text-emerald-600 block">$${item.price} 元</span>
                        </div>
                        <select name="qty_${index}" onchange="toggleOptionsBox(${index}, this.value)" class="border border-gray-300 rounded p-1 text-xs bg-white">
                            <option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        </select>
                    </div>
                `;
                
                if (item.options) {
                    let optDiv = document.createElement('div');
                    optDiv.id = `opt_box_${index}`;
                    optDiv.className = "hidden mt-3 p-2.5 bg-gray-50 rounded-lg text-xs space-y-2 border border-gray-100 text-gray-500";
                    optDiv.innerHTML = `<p class="font-semibold text-gray-700">↳ 客製化選項：</p>`;
                    
                    item.options.split(",").forEach((rawOpt, optIdx) => {
                        let parts = rawOpt.split("+");
                        let optName = parts[0].trim();
                        let optPrice = parseInt(parts[1]) || 0;
                        optDiv.innerHTML += `
                            <label class="flex items-center space-x-2 mt-1 cursor-pointer">
                                <input type="checkbox" name="opt_${index}_${optIdx}" value="${optName}" data-price="${optPrice}" class="rounded text-black">
                                <span>${optName} (+$${optPrice})</span>
                            </label>
                        `;
                    });
                    itemDiv.appendChild(optDiv);
                }
                menuContainer.appendChild(itemDiv);
            });
        });

        function toggleOptionsBox(index, qty) {
            const optBox = document.getElementById(`opt_box_${index}`);
            if (optBox) {
                if (parseInt(qty) > 0) optBox.classList.remove('hidden');
                else optBox.classList.add('hidden');
            }
        }

        // 送出訂單邏輯
        document.getElementById('menuForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-order-btn');
            submitBtn.disabled = true; submitBtn.innerText = "⏳ 傳送中...";

            let finalItems = []; let total = 0; let itemsOrderedMap = {};
            const brandMenu = dbData.menus[selectedBrand.id] || [];

            brandMenu.forEach((item, index) => {
                const qtySelect = document.querySelector(`select[name="qty_${index}"]`);
                if (!qtySelect) return;
                const qty = parseInt(qtySelect.value);
                if (qty > 0) {
                    let desc = `${item.name} x ${qty}`; let sum = item.price * qty; let opts = [];
                    if (item.options) {
                        item.options.split(",").forEach((rawOpt, optIdx) => {
                            const cb = document.querySelector(`input[name="opt_${index}_${optIdx}"]`);
                            if (cb && cb.checked) {
                                let price = parseInt(cb.getAttribute('data-price')) || 0;
                                opts.push(cb.value); sum += (price * qty);
                            }
                        });
                    }
                    if (opts.length > 0) desc += ` [${opts.join('+')}]`;
                    finalItems.push(desc); total += sum; itemsOrderedMap[item.name] = qty;
                }
            });

            const uniqueToken = "NX_" + Date.now();
            const orderData = {
                brandId: selectedBrand.id, brand: selectedBrand.name,
                name: document.getElementById('cust_name').value, phone: document.getElementById('cust_phone').value,
                date: document.getElementById('pickup_date').value, time: document.getElementById('pickup_time').value,
                order_content: finalItems.join(' ｜ '), total: total, dining_option: "外帶",
                note: document.getElementById('order_note').value || "無", orderToken: uniqueToken, itemsOrdered: itemsOrderedMap
            };

            fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(orderData) }).then(() => {
                localStorage.setItem('nx_space_last_order', JSON.stringify(orderData));
                alert("🎉 預訂成功！"); location.reload();
            });
        });

        function checkOrderHistory() {
            const localData = localStorage.getItem('nx_space_last_order');
            if (localData) {
                const order = JSON.parse(localData);
                document.getElementById('history-card').classList.remove('hidden');
                document.getElementById('hist-brand').innerText = order.brand;
                document.getElementById('hist-time').innerText = `${order.date} ${order.time}`;
                document.getElementById('hist-content').innerText = order.order_content;
                document.getElementById('hist-total').innerText = order.total;
            }
        }
    </script>
</body>
</html>
